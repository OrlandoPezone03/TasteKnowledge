<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Haity Fat</title>
    <link rel="icon" href="../../assets/logo.svg">
    <link rel="stylesheet" href="../css/navBar.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="../js/navbar.js"></script>
</head>
<body>
    <!-- Header con logo e navbar -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="../../assets/logo.svg" alt="Taste Knowledge">
            </div>
            <!-- NavBar: iniettata da navbar.js -->
            <div id="navbar-container" aria-hidden="true"></div>
        </div>
    </header>

    <div class="app-container">

        <div class="content-grid">
            
            <aside class="sidebar">
                
                <div class="profile-header">
                    <div class="settings-icon">⚙️</div>
                    
                    <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80" alt="Haity" class="profile-avatar-large">
                    
                    <div class="profile-name-row">
                        <h2 style="margin:0; font-size:20px; color:#2c3e50;">Haity Fat</h2>
                        <button class="edit-btn">✎</button>
                    </div>
                    
                    <div style="margin-top:10px;">
                        <div class="stats-count">302</div>
                        <div class="stats-label">Following</div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                
                <h2 style="color: #2c3e50; margin-bottom: 25px;">Favorites <span style="color:#e74c3c;">❤️</span></h2>

                <div class="favorites-grid">
                    
                    <div class="recipe-card-mini">
                        <div class="card-header">
                            <img src="https://i.pravatar.cc/150?u=john" class="mini-avatar">
                            <span class="mini-author">John Priyadi</span>
                        </div>
                        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="card-image">
                        <div class="card-body">
                            <div class="card-title-row">
                                <h3 class="card-title">Salad</h3>
                                <span class="card-rating">★ 4.5</span>
                            </div>
                            <div class="card-meta">
                                <div class="difficulty-icons">
                                    <svg class="bowl-icon filled" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                </div>
                                <span class="time-label">⏱ 30 mins</span>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-card-mini">
                        <div class="card-header">
                            <img src="https://i.pravatar.cc/150?u=eilif" class="mini-avatar">
                            <span class="mini-author">Eilif Sonas</span>
                        </div>
                        <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="card-image">
                        <div class="card-body">
                            <div class="card-title-row">
                                <h3 class="card-title">Salad</h3>
                                <span class="card-rating">★ 4.5</span>
                            </div>
                            <div class="card-meta">
                                <div class="difficulty-icons">
                                    <svg class="bowl-icon filled" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon filled" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                </div>
                                <span class="time-label">⏱ 30 mins</span>
                            </div>
                        </div>
                    </div>

                     <div class="recipe-card-mini">
                        <div class="card-header">
                            <img src="https://i.pravatar.cc/150?u=mark" class="mini-avatar">
                            <span class="mini-author">Mark Lee</span>
                        </div>
                        <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="card-image">
                        <div class="card-body">
                            <div class="card-title-row">
                                <h3 class="card-title">Avocado Toast</h3>
                                <span class="card-rating">★ 4.8</span>
                            </div>
                            <div class="card-meta">
                                <div class="difficulty-icons">
                                    <svg class="bowl-icon filled" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                    <svg class="bowl-icon" viewBox="0 0 24 24"><path d="M2 12h20c-.55 5.5-3.5 10-10 10S2.55 17.5 2 12z"/></svg>
                                </div>
                                <span class="time-label">⏱ 15 mins</span>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

</body>
</html>
